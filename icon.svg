<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Green circle background -->
  <circle cx="256" cy="256" r="256" fill="#4CAF50"/>

  <!-- Shadow overlay (long shadow effect) -->
  <path d="M512 256 L256 512 L512 512 Z" fill="#388E3C" opacity="0.5"/>
  <path d="M290 512 L512 290 L512 512 Z" fill="#388E3C" opacity="0.3"/>

  <!-- Money/cards sticking out of wallet top -->
  <!-- Card 1 (left, tilted left) -->
  <rect x="148" y="108" width="72" height="100" rx="8" fill="white" opacity="0.95" transform="rotate(-18 184 158)"/>
  <!-- Card 2 (middle) -->
  <rect x="210" y="92" width="72" height="108" rx="8" fill="white" opacity="0.9" transform="rotate(-5 246 146)"/>
  <!-- Coin/gear (right) -->
  <circle cx="340" cy="148" r="44" fill="white" opacity="0.95"/>
  <circle cx="340" cy="148" r="30" fill="#4CAF50" opacity="0.7"/>
  <!-- Gear teeth suggestion -->
  <circle cx="340" cy="118" r="7" fill="white"/>
  <circle cx="340" cy="178" r="7" fill="white"/>
  <circle cx="310" cy="148" r="7" fill="white"/>
  <circle cx="370" cy="148" r="7" fill="white"/>
  <circle cx="319" cy="127" r="6" fill="white"/>
  <circle cx="361" cy="127" r="6" fill="white"/>
  <circle cx="319" cy="169" r="6" fill="white"/>
  <circle cx="361" cy="169" r="6" fill="white"/>
  <circle cx="340" cy="148" r="14" fill="white"/>

  <!-- Wallet body -->
  <rect x="110" y="210" width="292" height="200" rx="22" fill="white"/>

  <!-- Wallet clasp/flap on right -->
  <rect x="332" y="248" width="90" height="124" rx="18" fill="#388E3C"/>
  <circle cx="377" cy="310" r="22" fill="#4CAF50"/>
  <circle cx="377" cy="310" r="10" fill="#388E3C"/>

  <!-- Trend arrow inside wallet -->
  <polyline points="138,350 180,320 222,340 278,285" fill="none" stroke="#4CAF50" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="278,285 310,278 300,308" fill="#4CAF50"/>
</svg>
