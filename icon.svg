<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#1A1917"/>

  <!-- Wallet body -->
  <rect x="72" y="152" width="368" height="240" rx="28" fill="#D4A017"/>

  <!-- Wallet flap -->
  <rect x="72" y="152" width="368" height="90" rx="28" fill="#B8880F"/>
  <rect x="72" y="200" width="368" height="42" fill="#B8880F"/>

  <!-- Pocket -->
  <rect x="280" y="218" width="132" height="110" rx="20" fill="#1A1917"/>
  <circle cx="346" cy="273" r="32" fill="#D4A017"/>
  <circle cx="346" cy="273" r="18" fill="#1A1917"/>
  <circle cx="346" cy="273" r="8" fill="#D4A017"/>

  <!-- Card lines in wallet -->
  <rect x="100" y="310" width="140" height="16" rx="5" fill="#F5F0E8" opacity="0.35"/>
  <rect x="100" y="336" width="100" height="12" rx="4" fill="#F5F0E8" opacity="0.2"/>

  <!-- Coins peeking top -->
  <circle cx="168" cy="148" r="36" fill="#E8B820"/>
  <circle cx="168" cy="148" r="24" fill="#D4A017"/>
  <text x="168" y="156" font-family="Georgia,serif" font-size="22" font-weight="700" fill="#1A1917" text-anchor="middle">₹</text>

  <circle cx="246" cy="136" r="30" fill="#E8B820"/>
  <circle cx="246" cy="136" r="20" fill="#D4A017"/>
  <text x="246" y="143" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#1A1917" text-anchor="middle">₹</text>
</svg>
